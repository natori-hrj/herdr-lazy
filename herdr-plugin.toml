id = "natori.lazy"
name = "herdr-lazy"
version = "0.1.0"
min_herdr_version = "0.7.0"
description = "Be lazy: a curated, batteries-included plugin distro & manager for herdr"
platforms = ["linux", "macos", "windows"]

# herdr runs this after `plugin install`, before registering the plugin.
# Both paths produce target/release/herdr-lazy, which the actions and pane below execute.
#
# On Unix, try a checksum-verified prebuilt binary first so installing does not require a
# Rust toolchain; the script falls back to `cargo build --release` whenever that is not
# possible. Windows has no prebuilt yet and builds from source directly.
[[build]]
platforms = ["linux", "macos"]
command = ["/bin/sh", "scripts/fetch-or-build.sh"]

[[build]]
platforms = ["windows"]
command = ["cargo", "build", "--release"]

# Actions surface herdr-lazy inside herdr's command palette.
[[actions]]
id = "probe"
title = "Lazy: probe CLI bridge"
contexts = ["workspace"]
command = ["target/release/herdr-lazy", "probe"]

[[actions]]
id = "init"
title = "Lazy: install curated defaults"
contexts = ["workspace"]
command = ["target/release/herdr-lazy", "init"]

[[actions]]
id = "sync"
title = "Lazy: sync plugins to bundle"
contexts = ["workspace"]
command = ["target/release/herdr-lazy", "sync"]

[[actions]]
id = "manage"
title = "Lazy: open manage pane"
contexts = ["workspace"]
command = ["target/release/herdr-lazy", "ui"]

# The manage UI. `overlay` matches what LazyVim's :Lazy feels like — a temporary zoomed
# view that hands focus back to whatever you were doing when it closes.
[[panes]]
id = "manage"
title = "herdr-lazy"
placement = "overlay"
command = ["target/release/herdr-lazy", "ui"]
